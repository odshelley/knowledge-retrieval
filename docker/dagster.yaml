storage:
  postgres:
    postgres_db:
      username:
        env: POSTGRES_USER
      password:
        env: POSTGRES_PASSWORD
      hostname:
        env: POSTGRES_HOST
      db_name:
        env: POSTGRES_DB
      port:
        env: POSTGRES_PORT

run_coordinator:
  module: dagster.core.run_coordinator
  class: QueuedRunCoordinator
  config:
    # OpenAI gpt-5-nano on a low rate-limit tier (200k TPM as of May 2026) gets
    # tripped easily when multiple kg_extracted partitions run in parallel —
    # each one fans out N concurrent LLM calls inside SimpleKGPipeline. Keep
    # this at 1 until you bump the OpenAI tier (or switch extraction model).
    max_concurrent_runs: 1

run_launcher:
  module: dagster.core.launcher
  class: DefaultRunLauncher

# DefaultRunLauncher runs each run worker as a child of the code-location gRPC
# server; if that server recycles, the worker dies SILENTLY and the run stays
# STARTED forever — which, with max_concurrent_runs=1, wedges the whole queue
# (observed 2026-07-05: run 946f71c4 zombie after chunk 4/17, 8 runs queued
# behind it overnight). Run monitoring detects the dead worker and fails the
# run so the queue frees itself; max_runtime is a backstop for genuine hangs.
run_monitoring:
  enabled: true
  poll_interval_seconds: 60
  max_runtime_seconds: 7200

telemetry:
  enabled: false
